name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME;
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const version = pkg.version;

          if (tag !== `v${version}`) {
            console.error(`Tag ${tag} must match package.json version ${version}.`);
            process.exit(1);
          }

          let npmTag = "latest";
          let prerelease = "false";
          if (/-beta\.\d+$/.test(version)) {
            npmTag = "beta";
            prerelease = "true";
          } else if (/-rc\.\d+$/.test(version)) {
            npmTag = "rc";
            prerelease = "true";
          } else if (/-/.test(version)) {
            console.error("Only beta.N and rc.N prerelease versions are supported.");
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `npm_tag=${npmTag}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `prerelease=${prerelease}\n`);
          NODE

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun run test

      - run: bun ./bin/koubo-clip --help

      - name: Build canonical npm package
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          KOUBO_CLIP_SOURCE_REVISION: ${{ github.sha }}
        run: bun run package:npm "dist/koubo-clip-${VERSION}.tgz"

      - name: Verify installed canonical npm package
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          EXPECTED_SOURCE_REVISION: ${{ github.sha }}
        run: bun run verify:package:npm "dist/koubo-clip-${VERSION}.tgz"

      - uses: actions/upload-artifact@v4
        with:
          name: koubo-clip-${{ steps.meta.outputs.version }}-canonical-npm
          path: |
            dist/koubo-clip-${{ steps.meta.outputs.version }}.tgz
            dist/koubo-clip-${{ steps.meta.outputs.version }}.tgz.json
            dist/koubo-clip-${{ steps.meta.outputs.version }}.tgz.acceptance.json

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: npm install -g npm@^11.5.1

      - uses: actions/download-artifact@v4
        with:
          name: koubo-clip-${{ needs.validate.outputs.version }}-canonical-npm
          path: dist

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - run: bun install --frozen-lockfile

      - id: npm_auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
          fi

      - id: npm_status
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if npm view "koubo-clip@${VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm with token
        id: publish_with_token
        if: steps.npm_status.outputs.exists != 'true' && steps.npm_auth.outputs.mode == 'token'
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: npm publish "./dist/koubo-clip-${{ needs.validate.outputs.version }}.tgz" --access public --tag "$NPM_TAG" --provenance

      - name: Publish npm with trusted publishing
        if: steps.npm_status.outputs.exists != 'true' && (steps.npm_auth.outputs.mode == 'trusted' || steps.publish_with_token.outcome == 'failure')
        env:
          NPM_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: npm publish "./dist/koubo-clip-${{ needs.validate.outputs.version }}.tgz" --access public --tag "$NPM_TAG"

      - name: Verify registry-installed package
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          EXPECTED_SOURCE_REVISION: ${{ github.sha }}
        run: |
          mkdir -p dist/registry
          npm pack "koubo-clip@${VERSION}" --pack-destination dist/registry --registry=https://registry.npmjs.org/
          bun run verify:package:npm "dist/registry/koubo-clip-${VERSION}.tgz"
          node <<'NODE'
          const fs = require("fs");
          const crypto = require("crypto");
          const version = process.env.VERSION;
          const digest = path => crypto.createHash("sha256").update(fs.readFileSync(path)).digest("hex");
          const canonical = digest(`dist/koubo-clip-${version}.tgz`);
          const registry = digest(`dist/registry/koubo-clip-${version}.tgz`);
          if (canonical !== registry) throw new Error(`registry tarball digest mismatch: ${canonical} != ${registry}`);
          NODE

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.validate.outputs.version }}
          PRERELEASE: ${{ needs.validate.outputs.prerelease }}
          NPM_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: |
          notes="npm: koubo-clip@${VERSION} (${NPM_TAG})"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "dist/koubo-clip-${VERSION}.tgz" "dist/koubo-clip-${VERSION}.tgz.json" "dist/koubo-clip-${VERSION}.tgz.acceptance.json" --clobber
          else
            args=(--title "koubo-clip ${VERSION}" --notes "$notes" --verify-tag)
            if [ "$PRERELEASE" = "true" ]; then
              args+=(--prerelease)
            fi
            gh release create "$TAG" "dist/koubo-clip-${VERSION}.tgz" "dist/koubo-clip-${VERSION}.tgz.json" "dist/koubo-clip-${VERSION}.tgz.acceptance.json" "${args[@]}"
          fi
